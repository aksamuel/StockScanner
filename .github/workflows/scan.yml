# Stock Scanner CI Workflow
# Runs the stock scanner on a schedule (daily at market close) or on-demand.

name: Stock Scanner

on:
  # Manual trigger with configurable inputs
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode"
        type: choice
        options:
          - watchlist
          - universe
        default: watchlist
      limit:
        description: "Max number of tickers to scan (universe mode)"
        type: number
        default: 1000
      workers:
        description: "Number of parallel workers"
        type: number
        default: 20

  # Daily at 9:30 PM UTC (~4:30 PM ET, shortly after US market close)
  schedule:
    - cron: "30 21 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run scanner (universe mode)
        if: inputs.mode == 'universe'
        run: |
          python -m stockscanner.cli \
            --universe \
            --limit ${{ inputs.limit }} \
            --parallel \
            --workers ${{ inputs.workers }}

      - name: Run scanner (watchlist mode)
        if: inputs.mode != 'universe'
        run: python -m stockscanner.cli

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30
